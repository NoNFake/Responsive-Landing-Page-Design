<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <!-- [INTER] -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/styles/main.css" />
    <title>Nexcent</title>

    <!--  ICON -->
    <link rel="icon" href="./assets/media/icon/Icon.svg" />
  </head>

  <body>
    <!-- **** Header area *****  -->
    <header class="main-header">
      <a herf="#" class="logo main-header">
        <img src="./assets/media/img/Logo.svg" alt="Logo" />
      </a>

      <nav class="main-nav">
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#features">Features</a></li>
          <li><a href="#community">Community</a></li>
          <li><a href="#blog">Blog</a></li>
          <li><a href="#pricing">Pricing</a></li>
        </ul>
      </nav>

      <a herf="#" class="btn main-header">
        Register Now
        <div class="btn__icon-arrow">
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M11.2502 11.0002L13.7199 8.53045C14.0129 8.23755 14.0129 7.76266 13.7199 7.46976L11.2502 5.00003M13.5003 8.00011L2.5 8.00011"
              stroke="#ffffff"
              stroke-width="1.1"
              stroke-linecap="round"
            />
          </svg>
        </div>
      </a>
    </header>

    <!-- HERO IMAGE -->
    <main>
      <section class="hero">
        <div class="hero__content">
          <h1>
            Lessons and insights
            <h1>
              <span class="hero__content_primary_color">from 8 years</span>
            </h1>
          </h1>

          <p>
            Where to grow your business as a photographer: site or social media?
          </p>

          <a href="#" class="btn hero__content">Register</a>
        </div>

        <div class="image hero__content">
          <img
            src="./assets/media/img/Illustration.svg"
            alt="Hero Illustration"
          />
        </div>
      </section>
    </main>
  </body>
</html>
